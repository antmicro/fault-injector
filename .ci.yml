image: debian:bookworm

.build-setup: &build-setup
  before_get_sources:
    - apt-get -yq update > /dev/null && apt-get -yq upgrade
    - apt-get -yq install python3 make build-essential autoconf flex bison git ccache help2man curl cmake yosys gzip file grep

stages:
  - prepare
  - test

prepare-verilator:
  <<: *build-setup
  stage: prepare
  variables:
    VERILATOR_ROOT: /ci/verilator
    SCALENODE_CPU: 8
    SCALENODE_RAM: 16000
    CCACHE_DIR: .ccache
  cache:
    paths:
     - $CCACHE_DIR
  script:
    - git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${VERILATOR_URL}" -b master "$VERILATOR_ROOT"
    - cd verilator
    - git show -s
    - autoconf
    - ./configure --prefix=`pwd`
    - make -j `nproc`
  artifacts:
    paths:
      - verilator
    expire_in: 8 hours

run-test:
  <<: *build-setup
  stage: test
  variables:
    VERILATOR_ROOT: /ci/verilator
  dependencies:
    - prepare-verilator
  script:
    - bash test.sh
    - ctest --test-dir build -j --output-on-failure --timeout 60
    - bash src/FaultInjector/test/test.sh
  artifacts:
    paths:
      - obj_dir
      - fault_campaign_out.csv
      - worker.json
      - sim_no_fault.log
      - sim_fault.log
      - build/Testing/Temporary/LastTest.log
    expire_in: 8 hours

parser-test:
  <<: *build-setup
  stage: test
  variables:
    VERILATOR_ROOT: /ci/verilator
  dependencies:
    - prepare-verilator
  before_script:
    - git clone --depth 1 https://github.com/The-OpenROAD-Project/OpenROAD.git /ci/OpenROAD
  script:
    - ./build.sh
    - src/FaultGenerator/test/testParser.sh /ci/OpenROAD/test build/src/FaultGenerator/test/LibertyParserBin

